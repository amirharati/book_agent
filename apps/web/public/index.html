<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Agent Web Chat</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  </head>
  <body>
    <main class="workspace" id="workspace">
      <section class="pane left-pane">
        <header class="header">
          <h1>Document Viewer</h1>
          <div class="controls-row mode-switch-row">
            <button id="markdownViewButton" type="button">Markdown view</button>
            <button id="pdfViewButton" type="button">PDF view</button>
            <span class="subtle" id="fileStatus">Choose a workspace and current document.</span>
          </div>
        </header>

        <section class="panel viewer" id="viewerPanel" aria-live="polite">
          <div id="viewerPlaceholder" class="subtle">
            Create/select a workspace, add documents, and set a current document.
          </div>
          <article id="markdownViewer" class="markdown-viewer hidden"></article>
          <iframe id="pdfViewer" class="pdf-viewer hidden" title="PDF viewer"></iframe>
        </section>
      </section>

      <div class="divider" id="divider" aria-label="Resize panes" role="separator"></div>

      <section class="pane right-pane">
        <header class="header">
          <h1>Chat</h1>
          <p class="subtle" id="sessionStatus">Initializing session...</p>
        </header>

        <section class="panel chat-panel" id="chatPanel" aria-live="polite"></section>

        <form id="composer" class="composer">
          <textarea
            id="messageInput"
            name="message"
            rows="4"
            placeholder="Ask about the currently loaded book content..."
            required
          ></textarea>
          <div class="actions">
            <button id="sendButton" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <section class="config-dashboard" id="configDashboard">
      <button class="config-toggle" id="configToggleButton" type="button">Setup</button>
      <div class="config-panel hidden" id="configPanel">
        <div class="controls-row">
          <button id="closeConfigButton" type="button">Close</button>
        </div>

        <section class="panel setup-section">
          <h3>1) Workspace Root</h3>
          <label class="subtle">
            Root folder for all workspaces
            <div class="path-row">
              <input id="workspaceRootInput" type="text" placeholder="Pick or type workspace root folder" />
              <button id="pickWorkspaceRootButton" type="button">Pick</button>
              <button id="saveWorkspaceRootButton" type="button">Apply</button>
            </div>
          </label>
        </section>

        <section class="panel setup-section">
          <h3>2) Workspaces</h3>
          <div class="controls-row">
            <input id="newWorkspaceNameInput" type="text" placeholder="New workspace name (e.g. rl-study)" />
            <button id="createWorkspaceButton" type="button">Create workspace</button>
          </div>
          <label class="subtle">
            Existing workspace
            <select id="workspaceSelect"></select>
          </label>
          <div class="controls-row">
            <button id="openWorkspaceButton" type="button">Open workspace</button>
            <button id="copyWorkspaceButton" type="button" disabled>Copy workspace...</button>
          </div>
          <p class="subtle compact" id="workspaceMeta"></p>
        </section>

        <section class="panel setup-section">
          <h3>3) Documents</h3>
          <div class="controls-row">
            <button id="addDocumentButton" type="button" disabled>Add document</button>
          </div>
          <label class="subtle">
            Workspace documents
            <select id="documentSelect"></select>
          </label>
          <div class="controls-row">
            <button id="setCurrentDocumentButton" type="button" disabled>Set current + render</button>
          </div>
          <label class="subtle">
            Workspace output folder
            <input id="workspaceOutputInput" type="text" readonly />
          </label>
        </section>

        <span class="subtle" id="setupStatus">Workspace-first flow: root -> workspace -> documents -> current document.</span>
      </div>
    </section>

    <div class="modal-backdrop hidden" id="folderModal" role="dialog" aria-modal="true">
      <section class="folder-modal">
        <header class="folder-modal-header">
          <h2 id="folderModalTitle">Select</h2>
          <button id="closeFolderModalButton" type="button">×</button>
        </header>

        <p class="subtle" id="folderModalCurrentPath"></p>

        <div class="controls-row">
          <button id="folderModalUpButton" type="button">↑ Up</button>
          <button id="folderModalNewButton" type="button">+ New folder</button>
          <button id="folderModalSelectButton" type="button">Use this folder</button>
        </div>

        <section class="folder-list panel" id="folderList"></section>
      </section>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
